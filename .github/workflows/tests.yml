# Continuous Integration workflow for NetScope Python
# Runs the test suite on every push and pull request to ensure code quality

name: Run Tests

# Trigger the workflow on push and pull request events
on:
  push:
  pull_request:

jobs:
  test:
    # Use the latest Ubuntu runner
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Cache pip dependencies to speed up subsequent runs
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Step 4: Install project dependencies from requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install application and test dependencies, including pytest-cov
          pip install -r requirements.txt

      # Step 5: Run the test suite with coverage; build fails if any test fails
      - name: Run tests with coverage
        run: python -m pytest --cov=app --cov-report=term-missing -v
